<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Japan Travel Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">일본 여행 지도</div>
    <div class="actions">
      <button id="btnList" class="btn ghost">목록</button>
      <button id="btnMap" class="btn ghost active">지도</button>
    </div>
  </header>

  <main class="main">
    <section id="mapView" class="view active">
      <div class="searchRow">
        <div class="searchBox">
          <input id="searchInput" type="text" placeholder="검색 (장소/메모/태그)" autocomplete="off" />
          <button id="btnSearch" class="btn primary">검색</button>
        </div>
        <div class="rightBtns">
          <button id="btnLocate" class="btn ghost" title="내 위치">내 위치</button>
          <button id="btnAdd" class="btn primary" title="장소 추가 모드">＋</button>
        </div>
      </div>

      <div id="offlineBanner" class="offlineBanner hidden">
        오프라인 상태입니다. 지도/검색/주소 변환은 인터넷 연결이 필요합니다.
      </div>

      <div id="map" class="map"></div>

      <div id="sheetBackdrop" class="sheetBackdrop hidden"></div>
      <div id="sheet" class="sheet hidden" role="dialog" aria-modal="true">
        <div class="sheetHeader">
          <div class="sheetTitle" id="sheetTitle">선택한 위치</div>
          <button id="sheetClose" class="iconBtn" aria-label="닫기">✕</button>
        </div>

        <div class="sheetBody">
          <div class="addrLine">
            <div class="addrLabel">주소</div>
            <div class="addrText" id="addrText">주소를 불러오는 중…</div>
          </div>

          <div class="miniRow">
            <button id="btnStreet" class="btn ghost">스트리트뷰(구글지도)</button>
            <button id="btnCopy" class="btn ghost">주소 복사</button>
          </div>

          <div id="confirmRow" class="confirmRow">
            <button id="btnCancelAdd" class="btn ghost">취소</button>
            <button id="btnConfirmAdd" class="btn primary">이 위치 저장</button>
          </div>

          <form id="placeForm" class="placeForm hidden">
            <div class="formGrid">
              <label class="field">
                <span>이름</span>
                <input id="fName" type="text" placeholder="예) 스시 다이" />
              </label>
              <label class="field">
                <span>카테고리</span>
                <select id="fCat">
                  <option value="food">맛집</option>
                  <option value="cafe">카페</option>
                  <option value="stay">숙소</option>
                  <option value="spot">관광</option>
                  <option value="shop">쇼핑</option>
                  <option value="etc">기타</option>
                </select>
              </label>
              <label class="field full">
                <span>메모</span>
                <textarea id="fMemo" rows="3" placeholder="메모/팁/예약정보"></textarea>
              </label>
            </div>
            <div class="formActions">
              <button type="button" id="btnFormBack" class="btn ghost">뒤로</button>
              <button type="submit" class="btn primary">저장 완료</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <section id="listView" class="view">
      <div class="listHeader">
        <div class="listTitle">저장한 장소</div>
        <div class="listActions">
          <button id="btnExport" class="btn ghost">내보내기</button>
          <button id="btnImport" class="btn ghost">가져오기</button>
          <input id="importFile" type="file" accept="application/json" hidden />
        </div>
      </div>
      <div id="list" class="list"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
